# Dispara a pipeline automaticamente quando houver commit na branch 'develop'
trigger:
  branches:
    include:
      - develop

# Variáveis usadas no pipeline — edite conforme seu projeto
variables:
  environment: 'dev'
  webAppName: 'petshop-webapp-dev'               # Nome do App Service no Azure (Web App para o ambiente de desenvolvimento)
  resourceGroup: 'rg-peton-dev'                       # Nome do Resource Group (opcional neste pipeline)
  azureSubscription: 'AzureServiceConnection-Dev'     # Nome da Service Connection configurada no Azure DevOps Dev

# Define o tipo de máquina usada para rodar o pipeline
pool:
  vmImage: 'ubuntu-latest'

steps:
  # Etapa para instalar o Node.js na versão desejada (ajuste conforme sua aplicação)
  - task: NodeTool@0
    inputs:
      versionSpec: '18.x'                             # Versão do Node.js a ser usada
    displayName: 'Instalar Node.js'

  # Etapa para instalar as dependências do projeto Node.js (usa o package.json)
  - script: |
      npm install
    displayName: 'Instalar dependências do Node.js'

  # Etapa de build — somente se o projeto Node.js tiver esse processo (por exemplo, apps com Webpack, Next.js, etc.)
  - script: |
      npm run build
    displayName: 'Build do projeto Node.js (opcional)' 

  # Etapa para criar um arquivo .zip com o conteúdo do projeto para publicação no Azure
  - task: ArchiveFiles@2
    displayName: 'Arquivar arquivos para deploy'
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/nodeapp.zip'
      replaceExistingArchive: true

# Deploy para Azure Static Web App
  - task: AzureStaticWebApp@0
    displayName: 'Deploy Vue para Azure Static Web App'
    inputs:
      azure_static_web_apps_api_token: $(STATIC_WEBAPP_TOKEN)
      app_location: "petshop"          # Onde está o package.json
      output_location: "dist"          # Onde o Vue gera o index.html
