trigger:
  branches:
    include:
      - develop
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  workingDirectory: 'PetShop.WebApp'
  nodeVersion: '18.x'

stages:
  - stage: BuildAndDeployDev
    displayName: Build and Deploy Dev
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')
    variables:
      appName: 'petshop-webapp-dev'
      azureSubscription: 'AzureServiceConnection-Dev'
    jobs:
      - job: BuildAndDeployJobDev
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Install Node.js'

          - script: |
              cd $(workingDirectory)
              npm install
            displayName: 'Install dependencies'

          - script: |
              cd $(workingDirectory)
              npm run build
            displayName: 'Build Vue app'

          - task: AzureWebApp@1
            displayName: 'Deploy to Azure Web App (Dev)'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(appName)'
              package: '$(workingDirectory)/dist'

  - stage: BuildAndDeployProd
    displayName: Build and Deploy Prod
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
    variables:
      appName: 'petshop-webapp-prod'
      azureSubscription: 'AzureServiceConnection-Prod'
    jobs:
      - job: BuildAndDeployJobProd
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '$(nodeVersion)'
            displayName: 'Install Node.js'

          - script: |
              cd $(workingDirectory)
              npm install
            displayName: 'Install dependencies'

          - script: |
              cd $(workingDirectory)
              npm run build
            displayName: 'Build Vue app'

          - task: AzureWebApp@1
            displayName: 'Deploy to Azure Web App (Prod)'
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(appName)'
              package: '$(workingDirectory)/dist'
