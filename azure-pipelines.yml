# Dispara a pipeline automaticamente quando houver commit na branch 'master'
trigger:
  branches:
    include:
      - master

# Variáveis usadas no pipeline
variables:
  environment: 'prod'
  webAppName: 'petshop-webapp-prod'
  resourceGroup: 'rg-peton-prod'
  azureSubscription: 'AzureServiceConnection-Prod'

# Tipo de máquina
pool:
  vmImage: 'ubuntu-latest'

steps:
  # Instala o Node.js
  - task: NodeTool@0
    inputs:
      versionSpec: '22.x'
    displayName: 'Instalar Node.js v22.x'

  # Instala dependências dentro da pasta do projeto
  - script: |
      cd petshop
      node -v
      npm install
    displayName: 'Instalar dependências do Vue.js'

  # Gera a build (gera a pasta /dist)
  - script: |
      cd petshop
      npm run build
    displayName: 'Build do projeto Vue.js'

  # Copia a pasta dist para o staging
  - task: CopyFiles@2
    displayName: 'Copiar arquivos da build para staging'
    inputs:
      contents: '**'
      sourceFolder: 'petshop/dist'
      targetFolder: '$(Build.ArtifactStagingDirectory)'

  # Cria o zip do conteúdo da build
  - task: ArchiveFiles@2
    displayName: 'Arquivar build para deploy'
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)/petshop/dist'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/vueapp.zip'
      replaceExistingArchive: true

  # Deploy para o Azure Web App
  - task: AzureWebApp@1
    displayName: 'Deploy para Azure Web App (Prod)'
    inputs:
      azureSubscription: $(azureSubscription)
      appType: 'webAppLinux'
      appName: $(webAppName)
      package: '$(Build.ArtifactStagingDirectory)/vueapp.zip'
