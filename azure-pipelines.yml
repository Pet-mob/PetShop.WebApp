# Dispara a pipeline automaticamente quando houver commit na branch 'develop'
trigger:
  branches:
    include:
      - master

# Variáveis usadas no pipeline — edite conforme seu projeto
variables:
  environment: 'prod'
  webAppName: 'petshop-webapp-prod'               # Nome do App Service no Azure (Web App para o ambiente de desenvolvimento)
  resourceGroup: 'rg-peton-prod'                       # Nome do Resource Group (opcional neste pipeline)
  azureSubscription: 'AzureServiceConnection-Prod'     # Nome da Service Connection configurada no Azure DevOps Dev

# Define o tipo de máquina usada para rodar o pipeline
pool:
  vmImage: 'ubuntu-latest'

steps:
  # Etapa para instalar o Node.js na versão desejada (ajuste conforme sua aplicação)
  - task: NodeTool@0
    inputs:
      versionSpec: '22.x'                             # Versão do Node.js a ser usada
    displayName: 'Instalar Node.js v22.x'

  # Etapa para instalar as dependências do projeto Node.js (usa o package.json)
  - script: |
      cd petshop
      node -v      
      npm install
    displayName: 'Instalar dependências do Node.js'

  # Etapa de build — somente se o projeto Node.js tiver esse processo (por exemplo, apps com Webpack, Next.js, etc.)
  - script: |
      cd petshop
      npm run build
    displayName: 'Build do projeto Node.js (opcional)' 

  # Etapa para criar um arquivo .zip com o conteúdo do projeto para publicação no Azure
  - task: ArchiveFiles@2
    displayName: 'Arquivar arquivos para deploy'
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/nodeapp.zip'
      replaceExistingArchive: true

  # Etapa de deploy: envia o arquivo zipado para o Azure Web App (Linux)
  - task: AzureWebApp@1
    displayName: 'Deploy para Azure Web App (Prod)'
    inputs:
      azureSubscription: $(azureSubscription)
      appType: 'webAppLinux'                          # O App Service deve ser do tipo Linux
      appName: $(webAppName)
      package: '$(Build.ArtifactStagingDirectory)/nodeapp.zip'
